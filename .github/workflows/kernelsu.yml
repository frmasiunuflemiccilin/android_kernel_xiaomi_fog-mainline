name: Build NetHunter Kernel Fog with AR9271 & MT7601U

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4

      - name: Install Build Dependencies & Toolchains
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc bison flex libssl-dev libncurses-dev git wget python3 zip curl gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

      - name: Fix Ath9k HTC Conflict & Qualcomm L2 Counters
        run: |
          sed -i 's/htc_start/ath9k_htc_start/g' drivers/net/wireless/ath/ath9k/*.{c,h}
          sed -i 's/htc_stop/ath9k_htc_stop/g' drivers/net/wireless/ath/ath9k/*.{c,h}
          sed -i 's/htc_connect_service/ath9k_htc_connect_service/g' drivers/net/wireless/ath/ath9k/*.{c,h}
          sed -i 's/%[lid]/%u/g' drivers/perf/qcom_l2_counters.c

      - name: Compile Kernel
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          
          # 1. Ekstrak defconfig dasar bawaan vendor
          make O=out vendor/fog-perf_defconfig
          
          # 2. Kondisikan Atheros AR9271 menjadi Built-in (=y)
          sed -i 's/CONFIG_ATH_CARDS=m/CONFIG_ATH_CARDS=y/g' out/.config
          sed -i 's/CONFIG_ATH9K=m/CONFIG_ATH9K=y/g' out/.config
          sed -i 's/CONFIG_ATH9K_HW=m/CONFIG_ATH9K_HW=y/g' out/.config
          sed -i 's/CONFIG_ATH9K_COMMON=m/CONFIG_ATH9K_COMMON=y/g' out/.config
          sed -i 's/CONFIG_ATH9K_HTC=m/CONFIG_ATH9K_HTC=y/g' out/.config
          echo "CONFIG_ATH9K_HTC=y" >> out/.config
          echo "CONFIG_ATH9K_HTC_DEBUGFS=y" >> out/.config
          
          # 3. KONDISI PERMINTAAN: Pastikan MediaTek MT7601U Tetap Modul (=m)
          sed -i 's/CONFIG_MT7601U=y/CONFIG_MT7601U=m/g' out/.config
          sed -i 's/CONFIG_MT76_CORE=y/CONFIG_MT76_CORE=m/g' out/.config
          sed -i 's/CONFIG_MT76_USB=y/CONFIG_MT76_USB=m/g' out/.config
          
          # 4. Sinkronisasi dependensi Kconfig otomatis
          make O=out olddefconfig
          
          # 5. Jalankan kompilasi kernel utama dan modul eksternal sekaligus
          make -j$(nproc) O=out \
            ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi-

      - name: Package with AnyKernel3
        run: |
          # 1. Klon repositori dasar AnyKernel3 resmi
          git clone https://github.com/osm0sis/AnyKernel3.git -b master anykernel
          
          # 2. Pindahkan berkas gambar kernel utama yang sudah membawa driver ath9k didalamnya
          if [ -f "out/arch/arm64/boot/Image.gz-dtb" ]; then
            cp out/arch/arm64/boot/Image.gz-dtb anykernel/
          elif [ -f "out/arch/arm64/boot/Image.gz" ]; then
            cp out/arch/arm64/boot/Image.gz anykernel/
          elif [ -f "out/arch/arm64/boot/Image" ]; then
            cp out/arch/arm64/boot/Image anykernel/
          fi
          
          # 3. PROSES PENCARIAN MODUL .KO: Otomatis mencari hasil build (.ko milik MediaTek)
          mkdir -p anykernel/modules/system/lib/modules
          find out/ -name "*.ko" -exec cp {} anykernel/modules/system/lib/modules/ \;
          
          cd anykernel
          
          # 4. Amandemen anykernel.sh khusus untuk perangkat Xiaomi Fog (Redmi 10C)
          sed -i 's/kernel.string=KernelName by YourName/kernel.string=NetHunter Kernel Fog Hybrid/g' anykernel.sh
          sed -i 's/device.name1=maguro/device.name1=fog/g' anykernel.sh
          
          # RAHASIA ANTI-BOOTLOOP: Aktifkan injeksi Systemless Magisk/KernelSU untuk modul luar (.ko)
          sed -i 's/do.modules=1/do.modules=1/g' anykernel.sh
          sed -i 's/do.systemless=1/do.systemless=1/g' anykernel.sh
          
          # Set partisi block otomatis untuk Xiaomi
          sed -i 's|BLOCK=/dev/block/platform/omap/omap_hsmmc.0/by-name/boot;|BLOCK=auto;|g' anykernel.sh
          sed -i 's/IS_SLOT_DEVICE=0;/IS_SLOT_DEVICE=auto;/g' anykernel.sh
          
          # 5. Bungkus paket instalasi menjadi ZIP tanpa membawa file git / readme bawaan
          zip -r9 ../NetHunter-Fog-AR9271-Kernel.zip * -x .git README.md

      - name: Upload Kernel ZIP Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NetHunter-Fog-AR9271-Kernel
          path: NetHunter-Fog-AR9271-Kernel.zip
