name: Build NetHunter Kernel Fog with Magisk Support

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4

      - name: Install Build Dependencies & Toolchains
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc bison flex libssl-dev libncurses-dev git wget python3 zip curl gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

      - name: Compile Kernel
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          
          # Membuat defconfig awal perangkat Xiaomi fog
          make O=out vendor/fog-perf_defconfig
          
          # Memperbarui file konfigurasi secara otomatis
          yes "" | make O=out oldconfig
          
          # Memulai proses kompilasi penuh menggunakan semua core CPU tersedia
          make O=out -j$(nproc) O=out \
            ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi-

      - name: Package with AnyKernel3
        run: |
          # Mengunduh AnyKernel3 untuk membungkus hasil kompilasi kernel ke bentuk berkas .zip flashable
          git clone https://github.com -b master anykernel
          
          if [ -f "out/arch/arm64/boot/Image" ]; then
            cp out/arch/arm64/boot/Image anykernel/
          elif [ -f "out/arch/arm64/boot/Image.gz" ]; then
            cp out/arch/arm64/boot/Image.gz anykernel/
          fi
          
          cd anykernel
          zip -r9 ../NetHunter-Fog-Magisk-Kernel.zip *

      - name: Upload Kernel ZIP Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NetHunter-Fog-Magisk-Kernel
          path: NetHunter-Fog-Magisk-Kernel.zip
          
