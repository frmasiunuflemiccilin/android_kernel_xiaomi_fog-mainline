name: Build NetHunter Kernel Fog with Magisk Support

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4

      - name: Install Build Dependencies & Toolchains
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc bison flex libssl-dev libncurses-dev git wget python3 zip curl gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi
          
      - name: Fix Ath9k HTC Conflict
        run: |
          cd drivers/net/wireless/ath/ath9k
          find . -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i 's/\bhtc_start\b/ath9k_htc_start/g' {} +
          find . -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i 's/\bhtc_stop\b/ath9k_htc_stop/g' {} +
          find . -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i 's/\bhtc_connect_service\b/ath9k_htc_connect_service/g' {} +
          
    
      - name: Compile Kernel
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          
          # Membuat defconfig awal perangkat Xiaomi fog
          make O=out vendor/fog-perf_defconfig
          
          # Memperbarui file konfigurasi secara otomatis
          yes "" | make O=out oldconfig
          
          # Memulai proses kompilasi penuh menggunakan semua core CPU tersedia
          make O=out -j$(nproc) \
            ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi-

      - name: Package with AnyKernel3
        run: |
          # Mengunduh AnyKernel3 dengan URL repository yang lengkap
          git clone https://github.com/osm0sis/AnyKernel3 -b master anykernel
          
          if [ -f "out/arch/arm64/boot/Image" ]; then
            cp out/arch/arm64/boot/Image anykernel/
          elif [ -f "out/arch/arm64/boot/Image.gz" ]; then
            cp out/arch/arm64/boot/Image.gz anykernel/
          fi
          
          cd anykernel
          zip -r9 ../NetHunter-Fog-Magisk-Kernel.zip *

      - name: Upload Kernel ZIP Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NetHunter-Fog-Magisk-Kernel
          path: NetHunter-Fog-Magisk-Kernel.zip
          
