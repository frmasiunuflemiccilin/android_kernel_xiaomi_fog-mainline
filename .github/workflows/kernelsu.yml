name: Build NetHunter Fog with AR9271, MT7601U & BT Arsenal

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4

      - name: Install Build Dependencies & Toolchains
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc bison flex libssl-dev libncurses-dev git wget python3 zip curl gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

      - name: Fix Ath9k HTC Conflict & Qualcomm L2 Counters
        run: |
          # Perbaikan konflik fungsi teks penamaan
          sed -i 's/htc_start/ath9k_htc_start/g' drivers/net/wireless/ath/ath9k/*.{c,h}
          sed -i 's/htc_stop/ath9k_htc_stop/g' drivers/net/wireless/ath/ath9k/*.{c,h}
          sed -i 's/htc_connect_service/ath9k_htc_connect_service/g' drivers/net/wireless/ath/ath9k/*.{c,h}
          sed -i 's/%[lid]/%u/g' drivers/perf/qcom_l2_counters.c

      - name: Compile Kernel & Configure Bluetooth Arsenal
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          
          # 1. Ekstrak defconfig dasar bawaan vendor
          make O=out vendor/fog-perf_defconfig
          
          # 2. Kembalikan status Atheros AR9271 menjadi Built-in (=y)
          sed -i 's/CONFIG_ATH_CARDS=m/CONFIG_ATH_CARDS=y/g' out/.config || echo 'CONFIG_ATH_CARDS=y' >> out/.config
          sed -i 's/CONFIG_ATH9K=m/CONFIG_ATH9K=y/g' out/.config || echo 'CONFIG_ATH9K=y' >> out/.config
          sed -i 's/CONFIG_ATH9K_HW=m/CONFIG_ATH9K_HW=y/g' out/.config || echo 'CONFIG_ATH9K_HW=y' >> out/.config
          sed -i 's/CONFIG_ATH9K_COMMON=m/CONFIG_ATH9K_COMMON=y/g' out/.config || echo 'CONFIG_ATH9K_COMMON=y' >> out/.config
          sed -i 's/CONFIG_ATH9K_HTC=m/CONFIG_ATH9K_HTC=y/g' out/.config || echo 'CONFIG_ATH9K_HTC=y' >> out/.config
          
          # 3. Pastikan MediaTek MT7601U Tetap Berstatus Modul (=m)
          sed -i 's/CONFIG_MT7601U=y/CONFIG_MT7601U=m/g' out/.config
          sed -i 's/CONFIG_MT76_CORE=y/CONFIG_MT76_CORE=m/g' out/.config
          sed -i 's/CONFIG_MT76_USB=y/CONFIG_MT76_USB=m/g' out/.config

          # 4. Aktifkan Subsistem Bluetooth & Bluetooth Arsenal (Internal & Eksternal)
          sed -i 's/# CONFIG_BT is not set/CONFIG_BT=y/g' out/.config
          sed -i 's/CONFIG_BT=m/CONFIG_BT=y/g' out/.config
          sed -i 's/# CONFIG_BT_RFCOMM is not set/CONFIG_BT_RFCOMM=y/g' out/.config
          sed -i 's/# CONFIG_BT_BNEP is not set/CONFIG_BT_BNEP=y/g' out/.config
          sed -i 's/# CONFIG_BT_HIDP is not set/CONFIG_BT_HIDP=y/g' out/.config
          sed -i 's/# CONFIG_BT_HCIUART is not set/CONFIG_BT_HCIUART=y/g' out/.config
          sed -i 's/# CONFIG_BT_HCIBTUSB is not set/CONFIG_BT_HCIBTUSB=y/g' out/.config
          
          # Tambahan driver HCIUART spesifik (untuk chip internal SoC Qualcomm/MediaTek)
          sed -i 's/# CONFIG_BT_HCIUART_H4 is not set/CONFIG_BT_HCIUART_H4=y/g' out/.config
          sed -i 's/# CONFIG_BT_HCIUART_BCSP is not set/CONFIG_BT_HCIUART_BCSP=y/g' out/.config
          sed -i 's/# CONFIG_BT_HCIUART_LL is not set/CONFIG_BT_HCIUART_LL=y/g' out/.config
          sed -i 's/# CONFIG_BT_HCIUART_3WIRE is not set/CONFIG_BT_HCIUART_3WIRE=y/g' out/.config
          sed -i 's/# CONFIG_BT_HCIUART_QCA is not set/CONFIG_BT_HCIUART_QCA=y/g' out/.config
          
          # 5. Sinkronisasi dependensi Kconfig otomatis
          make O=out olddefconfig
          
          # 6. Jalankan kompilasi kernel utama dan seluruh file modul eksternal .ko
          make -j$(nproc) O=out \
            ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi-
            
      - name: Package with AnyKernel3
        run: |
          # 1. Klon repositori dasar AnyKernel3 resmi
          git clone https://github.com/osm0sis/AnyKernel3.git -b master anykernel
          
          # 2. Pindahkan berkas gambar kernel utama hasil kompilasi bersih
          if [ -f "out/arch/arm64/boot/Image.gz-dtb" ]; then
            cp out/arch/arm64/boot/Image.gz-dtb anykernel/
          elif [ -f "out/arch/arm64/boot/Image.gz" ]; then
            cp out/arch/arm64/boot/Image.gz anykernel/
          elif [ -f "out/arch/arm64/boot/Image" ]; then
            cp out/arch/arm64/boot/Image anykernel/
          fi
          
          # 3. Kumpulkan sisa berkas modul .ko (seperti MediaTek) ke folder /modules
          mkdir -p anykernel/modules/system/lib/modules
          find out/drivers/net/wireless/ -name "*.ko" -exec cp {} anykernel/modules/system/lib/modules/ \;
          
          # 4. Bungkus paket instalasi menjadi ZIP
          cd anykernel
          zip -r9 ../NetHunter-Fog-BT-Arsenal-Kernel.zip * -x .git README.md
          
      - name: Upload Kernel ZIP Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NetHunter-Fog-BT-Arsenal-Kernel
          path: NetHunter-Fog-BT-Arsenal-Kernel.zip
          
