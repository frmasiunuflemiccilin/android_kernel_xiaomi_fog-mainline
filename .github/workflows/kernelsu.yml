name: Build NetHunter Kernel Fog with AR9271

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4

      - name: Install Build Dependencies & Toolchains
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc bison flex libssl-dev libncurses-dev git wget python3 zip curl gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

      - name: Fix Ath9k HTC Conflict & Qualcomm L2 Counters
        run: |
          sed -i 's/htc_start/ath9k_htc_start/g' drivers/net/wireless/ath/ath9k/*.{c,h}
          sed -i 's/htc_stop/ath9k_htc_stop/g' drivers/net/wireless/ath/ath9k/*.{c,h}
          sed -i 's/htc_connect_service/ath9k_htc_connect_service/g' drivers/net/wireless/ath/ath9k/*.{c,h}
          sed -i 's/%[lid]/%u/g' drivers/perf/qcom_l2_counters.c

      - name: Compile Kernel
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          
          # 1. Generate file konfigurasi dasar dari vendor (.config)
          make O=out vendor/fog-perf_defconfig
          
          # 2. Amandemen Konfigurasi: Paksa driver & sub-sistem nirkabel menjadi Built-in (=y)
          # Perintah ini menimpa baris modul (=m) lama yang ada di file defconfig secara otomatis
          sed -i 's/CONFIG_WIRELESS=m/CONFIG_WIRELESS=y/g' out/.config
          sed -i 's/CONFIG_CFG80211=m/CONFIG_CFG80211=y/g' out/.config
          sed -i 's/CONFIG_MAC80211=m/CONFIG_MAC80211=y/g' out/.config
          sed -i 's/CONFIG_WLAN=m/CONFIG_WLAN=y/g' out/.config
          sed -i 's/CONFIG_ATH_CARDS=m/CONFIG_ATH_CARDS=y/g' out/.config
          sed -i 's/CONFIG_ATH9K_HTC=m/CONFIG_ATH9K_HTC=y/g' out/.config
          
          # 3. Antisipasi jika parameter tersebut belum ada sama sekali di defconfig asli
          echo "CONFIG_WIRELESS=y" >> out/.config
          echo "CONFIG_CFG80211=y" >> out/.config
          echo "CONFIG_MAC80211=y" >> out/.config
          echo "CONFIG_NETDEVICES=y" >> out/.config
          echo "CONFIG_WLAN=y" >> out/.config
          echo "CONFIG_ATH_COMMON=y" >> out/.config
          echo "CONFIG_ATH_CARDS=y" >> out/.config
          echo "CONFIG_ATH9K_HTC=y" >> out/.config
          
          # Fitur injeksi paket & monitor mode ekstra untuk Kali NetHunter
          echo "CONFIG_CFG80211_WEXT=y" >> out/.config
          echo "CONFIG_MAC80211_LEDS=y" >> out/.config
          echo "CONFIG_ATH9K_HTC_DEBUGFS=y" >> out/.config
          
          # 4. Sinkronisasikan modifikasi setelan di atas agar dependensi Kconfig otomatis terpenuhi
          make O=out olddefconfig
          
          # 5. Jalankan kompilasi kernel
          make -j$(nproc) O=out \
            ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi-

      - name: Package with AnyKernel3
        run: |
          # 1. Unduh repositori resmi AnyKernel3
          git clone https://github.com -b master anykernel
          
          # 2. Ambil biner gambar kernel terkompilasi (terintegrasi driver AR9271)
          if [ -f "out/arch/arm64/boot/Image.gz-dtb" ]; then
            cp out/arch/arm64/boot/Image.gz-dtb anykernel/
          elif [ -f "out/arch/arm64/boot/Image.gz" ]; then
            cp out/arch/arm64/boot/Image.gz anykernel/
          elif [ -f "out/arch/arm64/boot/Image" ]; then
            cp out/arch/arm64/boot/Image anykernel/
          fi
          
          cd anykernel
          
          # 3. Hapus folder modul kosong bawaan template AnyKernel3 agar paket rapi
          rm -rf modules/
          
          # 4. Konfigurasi anykernel.sh otomatis agar kompatibel dengan Xiaomi Fog
          sed -i 's/kernel.string=KernelName by YourName/kernel.string=NetHunter Kernel Fog by AR9271/g' anykernel.sh
          sed -i 's/device.name1=maguro/device.name1=fog/g' anykernel.sh
          sed -i 's/do.modules=1/do.modules=0/g' anykernel.sh
          
          # Ubah ke mode blok otomatis (mencegah hardcode partisi boot Galaxy Nexus)
          sed -i 's|BLOCK=/dev/block/platform/omap/omap_hsmmc.0/by-name/boot;|BLOCK=auto;|g' anykernel.sh
          sed -i 's/IS_SLOT_DEVICE=0;/IS_SLOT_DEVICE=auto;/g' anykernel.sh
          
          # 5. Kompresi keseluruhan paket ke zip siap pakai
          zip -r9 ../NetHunter-Fog-AR9271-Kernel.zip * -x .git README.md

      - name: Upload Kernel ZIP Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NetHunter-Fog-AR9271-Kernel
          path: NetHunter-Fog-AR9271-Kernel.zip
