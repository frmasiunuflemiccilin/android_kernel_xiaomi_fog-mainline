name: Build NetHunter Kernel Fog with KSU and AR9271

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4

      - name: Setup KernelSU
        run: |
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s main

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc bison flex libssl-dev libncurses-dev git wget python3 zip curl

      - name: Download Official AOSP Clang Toolchain
        run: |
          mkdir -p clang
          wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r416183b.tar.gz -O clang.tar.gz || \
          wget -q https://github.com/chengnap/toolchain_clang/releases/download/r416183b/clang-r416183b.tar.gz -O clang.tar.gz
          tar -xzf clang.tar.gz -C clang
          echo "GITHUB_WORKSPACE=$PWD" >> $GITHUB_ENV

      - name: Compile Kernel
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
          
          # Gunakan config vendor fog-perf
          make O=out vendor/fog-perf_defconfig
          
          # Mulai proses kompilasi menggunakan Clang AOSP
          make -j$(nproc) O=out \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi-

      - name: Package with AnyKernel3
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git -b master anykernel
          
          if [ -f "out/arch/arm64/boot/Image" ]; then
            cp out/arch/arm64/boot/Image anykernel/
          elif [ -f "out/arch/arm64/boot/Image.gz" ]; then
            cp out/arch/arm64/boot/Image.gz anykernel/
          fi
          
          cd anykernel
          zip -r9 ../NetHunter-Fog-KSU-AR9271-Kernel.zip *

      - name: Upload Kernel ZIP Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NetHunter-Fog-KSU-AR9271-Kernel
          path: NetHunter-Fog-KSU-AR9271-Kernel.zip
          
