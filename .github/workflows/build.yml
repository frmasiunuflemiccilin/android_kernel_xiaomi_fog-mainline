name: Build NetHunter Kernel Fog with KSU and AR9271

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4

      - name: Setup KernelSU-Next
        run: |
          curl -LSsM "https://githubusercontent.com" | bash -s legacy
          
      - name: Install Build Dependencies & Toolchains
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc bison flex libssl-dev libncurses-dev git wget python3 zip curl gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

      - name: Compile Kernel
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          
          # Memuat defconfig awal perangkat
          make O=out vendor/fog-perf_defconfig
          
          # Otomatis menjawab 'yes' untuk konfigurasi baru (seperti KSU)
          yes "" | make O=out oldconfig
          
          # Memulai proses kompilasi penuh
          make O=out -j$(nproc) O=out \
            ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi-

      - name: Package with AnyKernel3
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git -b master anykernel
          
          if [ -f "out/arch/arm64/boot/Image" ]; then
            cp out/arch/arm64/boot/Image anykernel/
          elif [ -f "out/arch/arm64/boot/Image.gz" ]; then
            cp out/arch/arm64/boot/Image.gz anykernel/
          fi
          
          cd anykernel
          zip -r9 ../NetHunter-Fog-KSU-AR9271-Kernel.zip *

      - name: Upload Kernel ZIP Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NetHunter-Fog-KSU-AR9271-Kernel
          path: NetHunter-Fog-KSU-AR9271-Kernel.zip
          
